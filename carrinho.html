<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrinho.css">
</head>

<body>
    <div class="container">

        <header class="header">
            <div class="logo">
                <img src="images/ET-simple.png" alt="Entre Linhas">
                <h4>ENTRE LINHAS</h4>
            </div>

            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="catalogo.html">Catálogo</a>
                <a href="carrinho.html">Carrinho</a>
                <a href="clientes.html">Clientes</a>
                <a href="pedido.html">Pedidos</a>
                <a href="suporte.html">Suporte</a>
            </nav>
        </header>

        <main class="carrinho">

            <h1>Seu Carrinho</h1>

            <!-- ITEM 1 -->
            <div class="item-carrinho">
                <img src="images/1984_livro.jpg" alt="1984">

                <div class="info">
                    <h3>1984</h3>
                    <p>Autor: George Orwell</p>
                    <p>Preço: R$ 24,90</p>
                    <p>Quantidade: 1</p>
                </div>

                <button class="remover">Remover</button>
            </div>

            <!-- ITEM 2 -->
            <div class="item-carrinho">
                <img src="images/Maus.jpg" alt="Maus">

                <div class="info">
                    <h3>Maus</h3>
                    <p>Autor: Art Spiegelman</p>
                    <p>Preço: R$ 39,90</p>
                    <p>Quantidade: 1</p>
                </div>

                <button class="remover">Remover</button>
            </div>

            <div class="total">
                <h2>Total: R$ 64,80</h2>
                <a href="checkout.html" class="btn-finalizar">Finalizar Compra</a>
            </div>

        </main>

        <footer class="footer">
            <p>© Entre Linhas - Todos os direitos reservados</p>
        </footer>

    </div>
</body>

</html>
