<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedido realizado</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: rgba(0,0,0,0.4);
        }

        .sucesso-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .sucesso-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        .sucesso-box h1 {
            color: green;
            margin-bottom: 15px;
        }

        .sucesso-box p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn-voltar {
            background: #0d5c8c;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .btn-voltar:hover {
            background: #094a6d;
        }
    </style>
</head>

<body>

<div class="sucesso-container">
    <div class="sucesso-box">

        <h1>✅ Pagamento realizado!</h1>
        <p>Seu pedido foi finalizado com sucesso.</p>

        <a href="index.html" class="btn-voltar">Voltar para a loja</a>

    </div>
</div>

</body>
</html>
