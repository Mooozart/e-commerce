<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Linhas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="logo.png" alt="Entre Linhas">
            </div>

            <nav class="menu">
                <a href="#">Home</a>
                <a href="#">Catálogo</a>
                <a href="#">Carrinho</a>
                <a href="#">Clientes</a>
                <a href="#">Pedidos</a>
                <a href="#">Suporte</a>
            </nav>
        </header>

        <!-- BANNER -->
        <section class="banner">
            <h1>Bem-vindo a Entre Linhas!</h1>
            <p>Os melhores livros com os melhores preços</p>
        </section>

        <!-- PRODUTOS -->
        <main class="produtos">

            <div class="card">
                <img src="" alt="Livro">
                <h3>Livro A</h3>
                <p>R$ 29,90</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="" alt="Livro">
                <h3>Livro B</h3>
                <p>R$ 39,90</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="" alt="Livro">
                <h3>Livro C</h3>
                <p>R$ 19,90</p>
                <button>Comprar</button>
            </div>

        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <p>© Entre Linhas - cópia não comédia</p>
        </footer>

    </div>

</body>
</html>
